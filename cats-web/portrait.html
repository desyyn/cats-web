<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Images</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .portrait-img {
            width: 100%;
            height: 400px;        
            object-fit: cover;    
            border-radius: 10px;
        }
    </style>
</head>
<body>
    
    <div class="container text-center py-5">
        <h4><b>PORTRAIT</b></h4>
        <p class="text-secondary"><small>PORTRAIT PURRS</small></p>
    </div>

    <div class="container text-center py-3">
        <div class="row justify-content-center g-3">
            <div class="col-md-4">
                <img src="portrait1.jpg" class="img-fluid portrait-img" alt="L1">
            </div>
            <div class="col-md-4">
                <img src="portrait2.jpg" class="img-fluid portrait-img" alt="L2">
            </div>
        </div>
    </div>

</body>
</html>
